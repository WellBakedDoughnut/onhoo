
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F5E9C8; }
</style>

<div id="root" style="background: #F5E9C8; min-height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; font-family: 'Inter', sans-serif; position: relative; overflow: hidden;">

  <div style="position: absolute; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px;">
    <div style="width: 8px; height: 8px; background: #2ECC71; border-radius: 50%;"></div>
    <div style="width: 8px; height: 8px; background: #2ECC71; border-radius: 50%;"></div>
  </div>
  <div style="position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px;">
    <div style="width: 8px; height: 8px; background: #2ECC71; border-radius: 50%;"></div>
    <div style="width: 8px; height: 8px; background: #2ECC71; border-radius: 50%;"></div>
  </div>

  <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 40px;">
    <div style="border: 2.5px solid #1a1a1a; border-radius: 10px; padding: 4px 8px; display: flex; align-items: center; justify-content: center;">
      <span style="font-size: 18px; font-weight: 900; color: #1a1a1a; letter-spacing: -0.5px;">M</span>
    </div>
    <span style="font-size: 20px; font-weight: 700; color: #1a1a1a;">bank</span>
  </div>

  <h1 style="font-size: 32px; font-weight: 900; color: #1a1a1a; text-align: center; line-height: 1.25; margin-bottom: 36px; max-width: 420px;">
    Үндсэн системийн<br>шинэчлэлт хийж байна...
  </h1>

  <div style="width: 100%; max-width: 520px; margin-bottom: 8px;">
    <span id="pct-label" style="font-size: 28px; font-weight: 900; color: #1a1a1a;">0%</span>
  </div>

  <div style="width: 100%; max-width: 520px; background: #e0d4b0; border-radius: 8px; height: 28px; overflow: hidden; margin-bottom: 36px; position: relative;">
    <div id="bar" style="height: 100%; width: 0%; background: #b8cce0; border-radius: 8px; transition: width 1s linear;"></div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5a8a6a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
    </div>
  </div>

  <p style="font-size: 15px; color: #5a5040; text-align: center; line-height: 1.7; max-width: 380px; margin-bottom: 36px;">
    М-ийн найзууд нь банкны үндсэн системийн<br>
    шинэчлэлт хийж байгаа тул хүлээцтэй хандаарай.<br>
    Удахгүй илүү хүчирхэг банкны системээр уулзацгаая.
  </p>

  <div style="display: flex; align-items: center; gap: 4px;">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="20" cy="28" r="14" fill="#8ab0cc" opacity="0.7"/>
      <circle cx="20" cy="28" r="14" stroke="#5a88aa" stroke-width="1.5" fill="none"/>
      <path d="M14 28 L18 32 L26 22" stroke="#2ECC71" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M31 18 L34 10 M31 18 L38 16" stroke="#2ECC71" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="34" cy="34" r="6" fill="#e87020" opacity="0.8"/>
    </svg>
  </div>

  <div style="margin-top: 24px; font-size: 12px; color: #8a7a60;" id="time-left"></div>
</div>

<script>
  const DURATION_MS = 8 * 60 * 60 * 1000;
  const startTime = Date.now();

  function fmt(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return h + 'h ' + String(m).padStart(2,'0') + 'm ' + String(sec).padStart(2,'0') + 's';
  }

  function tick() {
    const elapsed = Date.now() - startTime;
    const pct = Math.min(100, Math.floor((elapsed / DURATION_MS) * 100));
    const remaining = Math.max(0, DURATION_MS - elapsed);

    document.getElementById('pct-label').textContent = pct + '%';
    document.getElementById('bar').style.width = pct + '%';
    document.getElementById('time-left').textContent = pct < 100 ? fmt(remaining) + ' remaining' : 'Complete';

    if (pct < 100) setTimeout(tick, 1000);
  }

  tick();
</script>
